repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff format
        entry: python -m ruff format
        language: system
        types_or:
          - python
          - pyi
      - id: ruff-check
        name: Ruff lint
        entry: python -m ruff check
        language: system
        types_or:
          - python
          - pyi
      - id: django-settings-smoke
        name: Django settings smoke test
        entry: python -m pytest tests/test_settings.py
        language: system
        pass_filenames: false
