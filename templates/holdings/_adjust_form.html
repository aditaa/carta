<form class="adjust-form" method="post" hx-post="{% url 'holdings:adjust' account.id %}" hx-target="#account-balances" hx-swap="innerHTML">
  {% csrf_token %}
  <div class="form-row">
    {{ form.action }}
  </div>
  <div class="form-row">
    {{ form.ruleset }}
  </div>
  <div class="form-row">
    {{ form.item_type }}
  </div>
  <div class="form-row">
    {{ form.item_key }}
  </div>
  <div class="form-row">
    {{ form.quantity }}
  </div>
  <div class="form-row">
    {{ form.note }}
  </div>
  {% if form.errors %}
    <div class="form-errors">
      {% for field, errors in form.errors.items %}
        {% for error in errors %}
          <p class="error">{{ error }}</p>
        {% endfor %}
      {% endfor %}
    </div>
  {% endif %}
  <div class="form-actions">
    <button type="submit">Save adjustment</button>
    <button type="button" onclick="this.closest('.adjust-modal').remove()">Cancel</button>
  </div>
</form>
