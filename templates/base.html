<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Carta Arcanum{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{% url 'dashboard:home' %}">Carta Arcanum</a>
      <nav class="site-nav" aria-label="Account">
        {% if request.user.is_authenticated %}
          <a href="{% url 'holdings:index' %}">Holdings</a>
          <span>{{ request.user.display_name }}</span>
          <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button type="submit">Sign out</button>
          </form>
        {% else %}
          <a href="{% url 'accounts:login' %}">Sign in</a>
        {% endif %}
      </nav>
    </header>
    <main class="site-main">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
