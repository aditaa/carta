{% extends "base.html" %}

{% block title %}Buildings | Carta Arcanum{% endblock %}

{% block content %}
  <section class="page-shell">
    <p class="eyebrow">Registry</p>
    <h1>Buildings</h1>
    <p><button class="btn-link" hx-get="{% url 'buildings:create' %}" hx-target="#building-modal-container" hx-swap="innerHTML">Add building</button></p>
    <form
      class="filter-form"
      method="get"
      hx-get="{% url 'buildings:index' %}"
      hx-target="#building-registry-results"
      hx-trigger="change delay:150ms, submit"
      hx-push-url="true"
    >
      <label>
        Status
        <select name="status">
          <option value="">All statuses</option>
          {% for value, label in filter_options.statuses %}
            <option value="{{ value }}"{% if filters.status == value %} selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Category
        <select name="category">
          <option value="">All categories</option>
          {% for category in filter_options.categories %}
            <option value="{{ category }}"{% if filters.category == category %} selected{% endif %}>{{ category }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Owner type
        <select name="owner_scope">
          <option value="">All owners</option>
          {% for value, label in filter_options.owner_scopes %}
            <option value="{{ value }}"{% if filters.owner_scope == value %} selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Specific owner
        <select name="owner">
          <option value="">All owners</option>
          {% for value, label in filter_options.owners %}
            <option value="{{ value }}"{% if filters.owner == value %} selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <div class="filter-actions">
        <button type="submit">Apply</button>
        <a href="{% url 'buildings:index' %}">Clear</a>
      </div>
    </form>
    <div id="building-registry-results">
      {% include "buildings/_registry_results.html" %}
    </div>
  </section>

  <div id="building-modal-container"></div>
{% endblock %}
