{% extends "base.html" %}

{% block title %}Change {{ target_user.display_name }} Password - {{ application_site_name }}{% endblock %}

{% block content %}
  <section class="auth-shell">
    <p class="eyebrow">User Management</p>
    <h1>Change Password</h1>
    <p class="muted">{{ target_user.display_name }} · {{ target_user.email }}</p>
    <form class="auth-form" method="post">
      {% csrf_token %}
      {{ form.as_div }}
      <button type="submit">Change password</button>
    </form>
  </section>
{% endblock %}
