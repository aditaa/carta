{% if page.has_other_pages %}
  <nav class="pagination" aria-label="Pagination">
    {% if page.has_previous %}
      <a class="button-link" href="?page={{ page.previous_page_number }}">Previous</a>
    {% endif %}
    <span class="muted">Page {{ page.number }} of {{ page.paginator.num_pages }}</span>
    {% if page.has_next %}
      <a class="button-link" href="?page={{ page.next_page_number }}">Next</a>
    {% endif %}
  </nav>
{% endif %}
