{% extends "base.html" %}

{% block title %}Set New Password - {{ application_site_name }}{% endblock %}

{% block content %}
  <section class="auth-shell">
    <p class="eyebrow">Account</p>
    <h1>Set New Password</h1>
    {% if validlink %}
      <form class="auth-form" method="post">
        {% csrf_token %}
        {{ form.as_div }}
        <button type="submit">Set password</button>
      </form>
    {% else %}
      <p class="error-message">This reset link is invalid or expired.</p>
    {% endif %}
  </section>
{% endblock %}
