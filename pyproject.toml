[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"backend/alembic/versions/*.py" = ["E501"]

[tool.pytest.ini_options]
markers = [
    "unit: fast tests for domain logic, validation, and service behavior",
    "functional: API-level tests through FastAPI's test client",
]
