[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]

[tool.ruff.lint.isort]
known-first-party = [
    "accounts",
    "buildings",
    "carta",
    "dashboard",
    "holdings",
    "ownership",
    "production",
    "progression",
    "resources",
    "rulesets",
    "solver",
    "transports",
]

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E501"]

[tool.pytest.ini_options]
markers = [
    "unit: fast tests for domain logic, validation, and service behavior",
    "functional: web-level tests through Django's test client",
    "integration: database-backed tests against external services such as MySQL",
]
