name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What planning, admin, map, or campaign task should this help with?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, page, command, or data model you have in mind.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Accounts or permissions
        - Buildings
        - Holdings
        - Production or solver
        - Progression
        - Campaign map
        - Rules import
        - Admin or operations
        - Documentation
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional notes about other approaches or tradeoffs.
