name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  django:
    name: Django checks
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: carta_arcanum
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Django system check
        env:
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        run: python manage.py check

      - name: Migration files are current
        env:
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        env:
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        run: python manage.py migrate

      - name: Test
        env:
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        run: pytest
